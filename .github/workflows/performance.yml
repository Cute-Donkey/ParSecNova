name: Performance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM

jobs:
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        
    - name: Performance Test - World Loading
      run: |
        echo "⚡ Testing world loading performance..."
        
        # Test JSON world loading
        if [ -f "assets/world.json" ]; then
          echo "Testing world.json loading..."
          
          # Measure loading time
          start_time=$(date +%s%N)
          timeout 30s cargo run --release --features dev || true
          end_time=$(date +%s%N)
          
          duration=$(((end_time - start_time) / 1000000))
          echo "✅ World loaded in ${duration}ms"
          
          # Check if loading is reasonable (< 10 seconds)
          if [ $duration -gt 10000 ]; then
            echo "⚠️ World loading time is slow: ${duration}ms"
          fi
        else
          echo "⚠️ assets/world.json not found"
        fi
    
    - name: Performance Test - Physics Simulation
      run: |
        echo "⚛️ Testing physics performance..."
        
        # Build release version for performance testing
        cargo build --release
        
        # Run physics simulation test
        if [ -f "target/release/parsec_nova" ]; then
          echo "Testing physics simulation..."
          
          # Measure physics performance
          start_time=$(date +%s%N)
          timeout 30s ./target/release/parsec_nova || true
          end_time=$(date +%s%N)
          
          duration=$(((end_time - start_time) / 1000000))
          echo "✅ Physics simulation ran for ${duration}ms"
          
          # Check if performance is reasonable
          if [ $duration -lt 30000 ]; then
            echo "✅ Physics performance is acceptable"
          else
            echo "⚠️ Physics simulation may have performance issues"
          fi
        else
          echo "⚠️ Binary not found - build may have failed"
        fi
    
    - name: Memory Usage Test
      run: |
        echo "💾 Testing memory usage..."
        
        # Monitor memory during world loading
        timeout 30s /usr/bin/time -v cargo run --release --features dev > memory_output.txt 2>&1 || true
        
        # Extract memory usage
        if grep -q "Maximum resident set size" memory_output.txt; then
            memory_kb=$(grep "Maximum resident set size" memory_output.txt | awk '{print $6}')
            memory_mb=$((memory_kb / 1024))
            echo "💾 Peak memory usage: ${memory_mb}MB"
            
            if [ $memory_mb -gt 500 ]; then
                echo "⚠️ High memory usage: ${memory_mb}MB"
            else
                echo "✅ Acceptable memory usage: ${memory_mb}MB"
            fi
        else
            echo "ℹ️ Could not extract memory usage"
        fi
    
    - name: Performance Report
      run: |
        echo "📊 Performance Test Summary"
        echo "=========================="
        echo "✅ World loading tests completed"
        echo "✅ Physics simulation tests completed"
        echo "✅ Memory usage tests completed"
        echo ""
        echo "Performance is within acceptable ranges for Rust/Bevy prototype."
