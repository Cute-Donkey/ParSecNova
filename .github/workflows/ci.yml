name: ParSec Nova CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  actions: read
  packages: write
  pages: write
  id-token: write

env:
  RUST_TOOLCHAIN: stable
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WINIT_BACKEND: x11
  WINIT_USE_X11: true

jobs:
  validate:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Validate Project Files
      run: |
        test -f Cargo.toml && echo "✅ Cargo.toml found" || exit 1
        test -d src && echo "✅ src found" || exit 1
        test -d assets && echo "✅ assets found" || exit 1

  build-rust:
    name: Build Rust Components
    runs-on: ubuntu-latest
    needs: validate
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Install System Dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libx11-dev libudev-dev libxkbcommon-dev libxrandr-dev libxi-dev xorg-dev libasound2-dev
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ env.RUST_TOOLCHAIN }}
    - name: Cache Cargo Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-v4-${{ hashFiles('**/Cargo.lock') }}
    - name: Build Project
      run: cargo build --profile ci-cd --verbose

  test-rust:
    name: Rust Headless Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Install System Dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libx11-dev libudev-dev libxkbcommon-dev libxrandr-dev libxi-dev xorg-dev libasound2-dev xvfb
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ env.RUST_TOOLCHAIN }}
    - name: Cache Cargo Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-v4-${{ hashFiles('**/Cargo.lock') }}
    - name: Test Headless Simulation
      run: |
        cargo build --profile ci-cd
        BINARY="target/ci-cd/parsec_nova"
        if [ -f "$BINARY" ]; then
          # Nutzt xvfb-run für den virtuellen Monitor
          timeout 15s xvfb-run ./$BINARY || echo "Application timed out as expected"
        else
          exit 1
        fi

  build-multiplatform:
    name: Multi-Platform Builds
    runs-on: ${{ matrix.os }}
    needs: [validate, build-rust, test-rust]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos
            target: x86_64-apple-darwin
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Install Linux Dependencies
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-dev libxrandr-dev libxi-dev xorg-dev
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ env.RUST_TOOLCHAIN }}
        target: ${{ matrix.target }}
    - name: Build for Platform
      run: |
        mkdir -p build/${{ matrix.platform }}/assets
        cargo build --profile ci-cd --target ${{ matrix.target }}
        
        # Binaries kopieren (Windows hat .exe Endung)
        if [ "${{ matrix.platform }}" = "windows" ]; then
          cp target/${{ matrix.target }}/ci-cd/parsec_nova.exe build/${{ matrix.platform }}/
        else
          cp target/${{ matrix.target }}/ci-cd/parsec_nova build/${{ matrix.platform }}/
        fi
        cp -r assets/* build/${{ matrix.platform }}/assets/
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: parsec-nova-${{ matrix.platform }}
        path: build/${{ matrix.platform }}/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-multiplatform]
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: releases/
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        files: |
          releases/parsec-nova-linux/*
          releases/parsec-nova-windows/*
          releases/parsec-nova-macos/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}