name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        
    - name: Run Rust Security Scan
      run: |
        echo "🔒 Running Rust security scan..."
        
        # Install cargo-audit if not present
        if ! command -v cargo-audit &> /dev/null; then
          cargo install cargo-audit
        fi
        
        # Run security audit
        cargo audit
        
        # Check for outdated dependencies
        if command -v cargo-outdated &> /dev/null; then
          cargo outdated
        else
          echo "ℹ️ cargo-outdated not available - install with: cargo install cargo-outdated"
        fi
    
    - name: Scan for Secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: "HEAD~1"
        head: HEAD
        fail: true
        
    - name: Check File Permissions
      run: |
        echo "🔒 Checking file permissions..."
        
        # Check for executable files that shouldn't be
        find . -type f -executable -name "*.rs" -exec echo "⚠️ Executable Rust file: {}" \;
        find . -type f -executable -name "*.toml" -exec echo "⚠️ Executable TOML file: {}" \;
        
        # Check for sensitive file patterns
        sensitive_patterns=("*.pem" "*.key" "*.p12" "id_rsa" "*.pfx")
        for pattern in "${sensitive_patterns[@]}"; do
          if find . -name "$pattern" | grep -v ".git" | head -5; then
            echo "⚠️ Found potential sensitive files matching $pattern"
          fi
        done
    
    - name: Validate .gitignore
      run: |
        echo "🔒 Validating .gitignore..."
        
        # Check for essential .gitignore entries
        required_entries=(
          "/target/"
          "Cargo.lock"
          "/dist/"
          "*.profraw"
          "*.log"
          "/assets/.bevy/"
        )
        
        for entry in "${required_entries[@]}"; do
          if ! grep -q "^$entry" .gitignore; then
            echo "⚠️ .gitignore missing recommended entry: $entry"
          fi
        done
        
        # Check for files that should be ignored
        if [ -d "target" ]; then
          echo "⚠️ target directory should be in .gitignore"
        fi
        
        if [ -d "dist" ]; then
          echo "⚠️ dist directory should be in .gitignore"
        fi
